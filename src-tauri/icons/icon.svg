<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景（纯色，避免渐变问题） -->
  <rect width="512" height="512" rx="120" fill="#10B981"/>
  
  <!-- 拼图块 1（左上） -->
  <rect x="140" y="140" width="120" height="120" rx="20" fill="white" fill-opacity="0.95"/>
  <rect x="220" y="180" width="40" height="40" fill="#10B981"/>
  
  <!-- 拼图块 2（右下） -->
  <rect x="232" y="232" width="120" height="120" rx="20" fill="white" fill-opacity="0.85"/>
  <rect x="312" y="272" width="40" height="40" fill="#10B981"/>
  
  <!-- 中心连接点 -->
  <circle cx="256" cy="256" r="15" fill="white"/>
  
  <!-- 装饰圆点 -->
  <circle cx="150" y="150" r="6" fill="white" fill-opacity="0.6"/>
  <circle cx="362" y="150" r="6" fill="white" fill-opacity="0.6"/>
  <circle cx="150" y="362" r="6" fill="white" fill-opacity="0.6"/>
  <circle cx="362" y="362" r="6" fill="white" fill-opacity="0.6"/>
</svg>
