<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skills Manager 测试</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #111827;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 20px;
    }
    .card {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .card h3 {
      margin: 0 0 8px 0;
      font-size: 16px;
    }
    .card p {
      margin: 0;
      font-size: 14px;
      color: #9ca3af;
    }
    .status {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      margin-top: 8px;
    }
    .status.ok {
      background: #065f46;
      color: #6ee7b7;
    }
    .status.error {
      background: #7f1d1d;
      color: #fca5a5;
    }
  </style>
</head>
<body>
  <h1>🧩 Skills Manager 测试页面</h1>
  
  <div class="card">
    <h3>peekaboo</h3>
    <p>Capture and automate macOS UI with the Peekaboo CL...</p>
    <span class="status ok">✅ 可用</span>
  </div>
  
  <div class="card">
    <h3>weather</h3>
    <p>Get current weather and forecasts via wttr.in or O...</p>
    <span class="status ok">✅ 可用</span>
  </div>
  
  <div class="card">
    <h3>agent-reach</h3>
    <p>Reach out to other agents</p>
    <span class="status error">❌ 缺依赖</span>
  </div>
  
  <script>
    console.log('测试页面加载成功！')
  </script>
</body>
</html>
